<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d"><title id="t">DataSniper guided setup preview</title><desc id="d">A plain-language household setup form designed for nontechnical users.</desc><rect width="1200" height="760" rx="30" fill="#f0fdfa"/><g transform="translate(170 55)"><rect width="860" height="650" rx="28" fill="white" stroke="#cbd5e1"/><g transform="translate(60 48)"><text fill="#0f172a" font-family="Segoe UI,Arial" font-size="18" font-weight="700">DATASNIPER SETUP</text><rect y="34" width="740" height="8" rx="4" fill="#e2e8f0"/><rect y="34" width="248" height="8" rx="4" fill="#14b8a6"/><text y="92" fill="#0f172a" font-family="Segoe UI,Arial" font-size="38" font-weight="750">Who are we protecting?</text><text y="127" fill="#64748b" font-family="Segoe UI,Arial" font-size="18">This information stays encrypted on this computer.</text><g transform="translate(0 170)"><text fill="#334155" font-family="Segoe UI,Arial" font-size="15" font-weight="650">Full name</text><rect y="14" width="740" height="58" rx="12" fill="#f8fafc" stroke="#94a3b8"/><text x="18" y="50" fill="#334155" font-family="Segoe UI,Arial" font-size="17">Jeff Smith</text><text y="108" fill="#334155" font-family="Segoe UI,Arial" font-size="15" font-weight="650">Email used for privacy requests</text><rect y="122" width="740" height="58" rx="12" fill="#f8fafc" stroke="#94a3b8"/><text x="18" y="158" fill="#334155" font-family="Segoe UI,Arial" font-size="17">jeff@example.com</text><g transform="translate(0 216)"><text fill="#334155" font-family="Segoe UI,Arial" font-size="15" font-weight="650">Home state</text><rect y="14" width="350" height="58" rx="12" fill="#f8fafc" stroke="#94a3b8"/><text x="18" y="50" fill="#334155" font-family="Segoe UI,Arial" font-size="17">North Carolina</text><text x="390" fill="#334155" font-family="Segoe UI,Arial" font-size="15" font-weight="650">Trusted family helper (optional)</text><rect x="390" y="14" width="350" height="58" rx="12" fill="#f8fafc" stroke="#94a3b8"/><text x="408" y="50" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="17">Spouse or caregiver</text></g><rect y="326" width="740" height="76" rx="14" fill="#ecfdf5"/><path d="M30 346 49 353v14c0 12-7 21-19 25-12-4-19-13-19-25v-14z" transform="translate(0 -2)" fill="#10b981"/><text x="70" y="357" fill="#065f46" font-family="Segoe UI,Arial" font-size="15" font-weight="700">Privacy promise</text><text x="70" y="382" fill="#047857" font-family="Segoe UI,Arial" font-size="14">No cloud account, no advertising profile, and no sale of your information.</text><rect x="500" y="438" width="240" height="62" rx="14" fill="#2563eb"/><text x="620" y="477" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="19" font-weight="700">Build my protection plan</text></g></g></g></svg>