<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d"><title id="t">Animated DataSniper workflow</title><desc id="d">An animated four-step privacy workflow: setup, prepare, submit, and monitor.</desc><defs><linearGradient id="g"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#14b8a6"/></linearGradient><style>.step{opacity:.25}.s1{animation:a 8s infinite}.s2{animation:a 8s 2s infinite}.s3{animation:a 8s 4s infinite}.s4{animation:a 8s 6s infinite}@keyframes a{0%,24%{opacity:1;transform:translateY(-8px)}25%,100%{opacity:.25;transform:none}}.line{stroke-dasharray:14 12;animation:m 2s linear infinite}@keyframes m{to{stroke-dashoffset:-52}}</style></defs><rect width="1200" height="640" rx="30" fill="#07111f"/><text x="600" y="72" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="34" font-weight="750">Privacy protection without the spreadsheet</text><text x="600" y="108" text-anchor="middle" fill="#9fb3c8" font-family="Segoe UI,Arial" font-size="18">DataSniper turns dozens of scattered tasks into one calm workflow.</text><path d="M205 325H995" stroke="#31516f" stroke-width="5" class="line"/><g class="step s1" transform="translate(70 185)"><rect width="250" height="280" rx="24" fill="#f8fafc"/><circle cx="125" cy="72" r="38" fill="url(#g)"/><text x="125" y="84" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="34" font-weight="750">1</text><text x="125" y="143" text-anchor="middle" fill="#0f172a" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Set up once</text><text x="125" y="183" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="15"><tspan x="125">Enter the minimum details</tspan><tspan x="125" dy="24">needed for requests.</tspan></text><rect x="42" y="225" width="166" height="36" rx="9" fill="#ecfdf5"/><text x="125" y="248" text-anchor="middle" fill="#047857" font-family="Segoe UI,Arial" font-size="13" font-weight="700">Encrypted locally</text></g><g class="step s2" transform="translate(340 185)"><rect width="250" height="280" rx="24" fill="#f8fafc"/><circle cx="125" cy="72" r="38" fill="url(#g)"/><text x="125" y="84" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="34" font-weight="750">2</text><text x="125" y="143" text-anchor="middle" fill="#0f172a" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Get one next step</text><text x="125" y="183" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="15"><tspan x="125">The agent prioritizes and</tspan><tspan x="125" dy="24">prepares the right task.</tspan></text><rect x="42" y="225" width="166" height="36" rx="9" fill="#eff6ff"/><text x="125" y="248" text-anchor="middle" fill="#1d4ed8" font-family="Segoe UI,Arial" font-size="13" font-weight="700">No broker expertise</text></g><g class="step s3" transform="translate(610 185)"><rect width="250" height="280" rx="24" fill="#f8fafc"/><circle cx="125" cy="72" r="38" fill="url(#g)"/><text x="125" y="84" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="34" font-weight="750">3</text><text x="125" y="143" text-anchor="middle" fill="#0f172a" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Approve safely</text><text x="125" y="183" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="15"><tspan x="125">The helper fills fields.</tspan><tspan x="125" dy="24">You control submission.</tspan></text><rect x="42" y="225" width="166" height="36" rx="9" fill="#fff7ed"/><text x="125" y="248" text-anchor="middle" fill="#c2410c" font-family="Segoe UI,Arial" font-size="13" font-weight="700">Human approval</text></g><g class="step s4" transform="translate(880 185)"><rect width="250" height="280" rx="24" fill="#f8fafc"/><circle cx="125" cy="72" r="38" fill="url(#g)"/><text x="125" y="84" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="34" font-weight="750">4</text><text x="125" y="143" text-anchor="middle" fill="#0f172a" font-family="Segoe UI,Arial" font-size="23" font-weight="700">Let it monitor</text><text x="125" y="183" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="15"><tspan x="125">Deadlines, rechecks, and</tspan><tspan x="125" dy="24">resurfacing stay tracked.</tspan></text><rect x="42" y="225" width="166" height="36" rx="9" fill="#ecfdf5"/><text x="125" y="248" text-anchor="middle" fill="#047857" font-family="Segoe UI,Arial" font-size="13" font-weight="700">Hands-off follow-up</text></g><text x="600" y="560" text-anchor="middle" fill="#d8e2ec" font-family="Segoe UI,Arial" font-size="21" font-weight="650">You do the decisions. DataSniper handles the bureaucracy.</text></svg>