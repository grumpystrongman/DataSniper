<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="t d"><title id="t">DataSniper local-first architecture</title><desc id="d">A diagram showing the browser companion, local application, encrypted vault, workflow engine, audit log, and encrypted backups.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 10 3 0 6z" fill="#64748b"/></marker></defs><rect width="1200" height="680" rx="28" fill="#f8fafc"/><text x="600" y="62" text-anchor="middle" fill="#0f172a" font-family="Segoe UI,Arial" font-size="34" font-weight="750">Local-first by design</text><text x="600" y="96" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="18">Your identity data stays inside the household boundary.</text><rect x="60" y="145" width="1080" height="445" rx="26" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/><text x="90" y="182" fill="#047857" font-family="Segoe UI,Arial" font-size="16" font-weight="700">YOUR COMPUTER OR PRIVATE HOME SERVER</text><g font-family="Segoe UI,Arial"><rect x="105" y="230" width="220" height="120" rx="18" fill="white" stroke="#cbd5e1"/><text x="215" y="276" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="700">Browser companion</text><text x="215" y="309" text-anchor="middle" fill="#64748b" font-size="14">Opens tasks and fills fields</text><rect x="490" y="210" width="220" height="160" rx="18" fill="#e8f2ff" stroke="#93c5fd"/><text x="600" y="265" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">DataSniper app</text><text x="600" y="300" text-anchor="middle" fill="#475569" font-size="14">One next action</text><text x="600" y="325" text-anchor="middle" fill="#475569" font-size="14">Household administration</text><rect x="875" y="230" width="220" height="120" rx="18" fill="white" stroke="#cbd5e1"/><text x="985" y="276" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="700">Privacy websites</text><text x="985" y="309" text-anchor="middle" fill="#64748b" font-size="14">User-approved submission</text><path d="M325 290H480" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M710 290H865" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="105" y="430" width="220" height="110" rx="18" fill="#07111f"/><text x="215" y="473" text-anchor="middle" fill="white" font-size="20" font-weight="700">Encrypted identity vault</text><text x="215" y="505" text-anchor="middle" fill="#9fb3c8" font-size="14">Minimum necessary data</text><rect x="490" y="430" width="220" height="110" rx="18" fill="#07111f"/><text x="600" y="473" text-anchor="middle" fill="white" font-size="20" font-weight="700">Workflow + audit log</text><text x="600" y="505" text-anchor="middle" fill="#9fb3c8" font-size="14">Deadlines and evidence</text><rect x="875" y="430" width="220" height="110" rx="18" fill="#07111f"/><text x="985" y="473" text-anchor="middle" fill="white" font-size="20" font-weight="700">Recovery backups</text><text x="985" y="505" text-anchor="middle" fill="#9fb3c8" font-size="14">Checksummed archives</text><path d="M535 370 285 420" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M600 370V420" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M665 370 915 420" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/></g><g transform="translate(320 620)"><circle cx="0" cy="0" r="7" fill="#10b981"/><text x="18" y="6" fill="#334155" font-family="Segoe UI,Arial" font-size="15">No cloud account required</text><circle cx="285" cy="0" r="7" fill="#10b981"/><text x="303" y="6" fill="#334155" font-family="Segoe UI,Arial" font-size="15">No advertising profile</text><circle cx="555" cy="0" r="7" fill="#10b981"/><text x="573" y="6" fill="#334155" font-family="Segoe UI,Arial" font-size="15">No data resale</text></g></svg>