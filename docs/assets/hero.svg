<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-labelledby="t d">
<title id="t">DataSniper household privacy dashboard preview</title><desc id="d">A calm product preview showing one next action, completed protections, and company follow-up tracking.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#102a43"/></linearGradient><linearGradient id="accent"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#14b8a6"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".25"/></filter></defs>
<rect width="1440" height="720" fill="url(#bg)"/>
<circle cx="1260" cy="90" r="250" fill="#0ea5e9" opacity=".09"/><circle cx="140" cy="650" r="310" fill="#14b8a6" opacity=".08"/>
<g transform="translate(90 75)"><path d="M52 0 94 15v31c0 27-16 46-42 56C26 92 10 73 10 46V15z" fill="url(#accent)"/><circle cx="52" cy="42" r="20" fill="none" stroke="white" stroke-width="5"/><circle cx="52" cy="42" r="5" fill="white"/><text x="118" y="49" fill="white" font-family="Segoe UI,Arial" font-size="44" font-weight="700">DataSniper</text><text x="118" y="82" fill="#9fb3c8" font-family="Segoe UI,Arial" font-size="19">Your family’s privacy work, handled one step at a time.</text></g>
<g transform="translate(90 220)"><text fill="white" font-family="Segoe UI,Arial" font-size="54" font-weight="760"><tspan x="0" dy="0">Take back your personal data.</tspan><tspan x="0" dy="66">Without another subscription.</tspan></text><text x="0" y="160" fill="#b8c7d9" font-family="Segoe UI,Arial" font-size="24"><tspan x="0" dy="0">DataSniper finds the right privacy tasks, prepares the work,</tspan><tspan x="0" dy="36">tracks deadlines, and reminds you only when you are needed.</tspan></text><g transform="translate(0 245)"><rect width="245" height="64" rx="14" fill="url(#accent)"/><text x="122" y="41" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="22" font-weight="700">Protect my family</text><rect x="265" width="190" height="64" rx="14" fill="none" stroke="#7f9bb7" stroke-width="2"/><text x="360" y="41" text-anchor="middle" fill="#d8e2ec" font-family="Segoe UI,Arial" font-size="21">See how it works</text></g></g>
<g transform="translate(790 115) rotate(2 260 255)" filter="url(#s)"><rect width="560" height="520" rx="28" fill="#f8fafc"/><rect width="560" height="72" rx="28" fill="#fff"/><circle cx="34" cy="36" r="6" fill="#ef4444"/><circle cx="56" cy="36" r="6" fill="#f59e0b"/><circle cx="78" cy="36" r="6" fill="#22c55e"/><text x="105" y="43" fill="#334155" font-family="Segoe UI,Arial" font-size="18" font-weight="650">DataSniper · Family dashboard</text><g transform="translate(30 96)"><text fill="#0f172a" font-family="Segoe UI,Arial" font-size="30" font-weight="740">Good afternoon, Jeff</text><text y="30" fill="#64748b" font-family="Segoe UI,Arial" font-size="15">Your agent is monitoring 11 privacy protections.</text><g transform="translate(0 66)"><rect width="500" height="150" rx="18" fill="#e8f2ff"/><text x="22" y="33" fill="#2563eb" font-family="Segoe UI,Arial" font-size="14" font-weight="700">YOUR NEXT STEP</text><text x="22" y="72" fill="#0f172a" font-family="Segoe UI,Arial" font-size="24" font-weight="700">Remove a PeopleConnect profile</text><text x="22" y="100" fill="#475569" font-family="Segoe UI,Arial" font-size="14">One request covers TruthFinder, Intelius,</text><text x="22" y="121" fill="#475569" font-family="Segoe UI,Arial" font-size="14">Instant Checkmate, and US Search.</text><rect x="335" y="87" width="140" height="43" rx="10" fill="#2563eb"/><text x="405" y="114" text-anchor="middle" fill="white" font-family="Segoe UI,Arial" font-size="15" font-weight="700">Continue</text></g><g transform="translate(0 238)"><rect width="115" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/><text x="18" y="39" fill="#0f172a" font-family="Segoe UI,Arial" font-size="27" font-weight="750">11</text><text x="18" y="65" fill="#64748b" font-family="Segoe UI,Arial" font-size="12">tracked</text><rect x="128" width="115" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/><text x="146" y="39" fill="#0f172a" font-family="Segoe UI,Arial" font-size="27" font-weight="750">4</text><text x="146" y="65" fill="#64748b" font-family="Segoe UI,Arial" font-size="12">waiting</text><rect x="256" width="115" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/><text x="274" y="39" fill="#0f172a" font-family="Segoe UI,Arial" font-size="27" font-weight="750">6</text><text x="274" y="65" fill="#64748b" font-family="Segoe UI,Arial" font-size="12">completed</text><rect x="384" width="116" height="92" rx="14" fill="#fff" stroke="#e2e8f0"/><text x="402" y="39" fill="#0f172a" font-family="Segoe UI,Arial" font-size="27" font-weight="750">1</text><text x="402" y="65" fill="#64748b" font-family="Segoe UI,Arial" font-size="12">recheck</text></g><g transform="translate(0 350)"><text fill="#0f172a" font-family="Segoe UI,Arial" font-size="18" font-weight="700">Recent progress</text><circle cx="10" cy="38" r="7" fill="#22c55e"/><text x="28" y="43" fill="#334155" font-family="Segoe UI,Arial" font-size="14">Spokeo marked removed</text><text x="400" y="43" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="12">Today</text><circle cx="10" cy="72" r="7" fill="#3b82f6"/><text x="28" y="77" fill="#334155" font-family="Segoe UI,Arial" font-size="14">Whitepages awaiting response</text><text x="400" y="77" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="12">12 days</text></g></g></g>
</svg>