name: Patch executor compatibility

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'agent/recover-automation-failures'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recover-automation-failures
      - name: Check whether patch is pending
        id: gate
        run: |
          if [ -f tools/patch_executor_compat.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.apply == 'true'
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: steps.gate.outputs.apply == 'true'
        run: |
          python -m pip install --upgrade pip --quiet
          pip install --quiet -r requirements.txt
      - name: Apply compatibility patch
        if: steps.gate.outputs.apply == 'true'
        run: python tools/patch_executor_compat.py
      - name: Run full test suite
        if: steps.gate.outputs.apply == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q
      - name: Compile application
        if: steps.gate.outputs.apply == 'true'
        run: python -m compileall -q app.py production.py run.py browser_executor.py browser_form_script.py browser_worker_core.py local_intelligence.py
      - name: Commit verified compatibility patch
        if: steps.gate.outputs.apply == 'true'
        run: |
          rm tools/patch_executor_compat.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore executor compatibility anchor"
          git push origin HEAD:agent/recover-automation-failures
