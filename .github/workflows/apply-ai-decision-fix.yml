name: Apply AI decision integration

on:
  push:
    branches:
      - agent/apply-llm-decisions
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[decision-fix-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/apply-llm-decisions
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply targeted source changes
        run: python tools/apply_ai_decision_fix.py
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Validate
        run: python -m py_compile browser_worker.py && pytest -q
      - name: Commit validated changes
        run: |
          git config user.name "DataSniper Agent"
          git config user.email "actions@users.noreply.github.com"
          git rm tools/apply_ai_decision_fix.py .github/workflows/apply-ai-decision-fix.yml
          git add browser_worker.py tests/test_browser_worker.py
          git commit -m "Apply local AI decisions safely [decision-fix-applied]"
          git push origin HEAD:agent/apply-llm-decisions
