name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip --quiet
      - run: pip install --quiet -r requirements.txt
      - name: Run tests
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest-${{ matrix.python-version }}.log 2>&1
          status=$?
          cat pytest-${{ matrix.python-version }}.log
          exit $status
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.log
      - run: python -m compileall -q app.py production.py run.py

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet -r requirements.txt pip-audit
      - run: pip-audit
