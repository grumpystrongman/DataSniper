<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}DataSniper Privacy Agent{% endblock %}</title>
  <style>
    :root{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#14213d;background:#f5f7fb;font-size:18px}
    *{box-sizing:border-box} body{margin:0} header{background:#14213d;color:white;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap} header a{color:white;text-decoration:none;font-weight:700} main{max-width:1000px;margin:0 auto;padding:28px 20px 70px}.card,.hero-state{background:white;border-radius:18px;padding:28px;margin:0 0 20px;box-shadow:0 8px 24px rgba(20,33,61,.08)}.hero-state{border-left:10px solid #16794b}.hero-state.help_needed,.hero-state.repair{border-color:#d98200;background:#fffaf0}h1,h2{line-height:1.15}h1{font-size:2.25rem;margin-top:0}.hero-message{font-size:1.25rem;line-height:1.55;max-width:760px}.eyebrow{text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:#5f6b7a;font-size:.85rem}.button,button{display:inline-block;border:0;border-radius:12px;background:#1769e0;color:white;padding:15px 22px;font-weight:750;font-size:1rem;text-decoration:none;cursor:pointer}.button.secondary,button.secondary{background:#e9eef7;color:#14213d}.button.success,button.success{background:#16794b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}.parent-counts{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.parent-counts>div{background:#f5f7fb;padding:18px;border-radius:14px;display:flex;flex-direction:column}.parent-counts .needs-help{background:#fff1cc}.metric{font-size:2rem;font-weight:800}.muted{color:#5f6b7a}.status{display:inline-block;padding:6px 10px;border-radius:999px;background:#edf2fa;font-weight:700}.status.removed,.status.not_found,.status.completed{background:#def5e9;color:#12633d}.status.verification_due,.status.awaiting_feedback,.status.action_required{background:#fff1cc;color:#7a4d00}.status.failed{background:#ffe0e0;color:#8d2020}label{display:block;font-weight:750;margin:18px 0 7px}input,select,textarea{width:100%;padding:14px;border:2px solid #ced7e5;border-radius:12px;font:inherit}textarea{min-height:110px}.task-row{display:flex;justify-content:space-between;gap:20px;align-items:center;padding:18px 0;border-top:1px solid #e5eaf2}.task-row:first-child{border-top:0}.task-row .details{min-width:0}.notice{background:#fff7d6;border-left:6px solid #e5a900;padding:16px;border-radius:10px}.good{background:#e4f7ed;border-left:6px solid #16794b;padding:16px;border-radius:10px}.actions{display:flex;gap:12px;flex-wrap:wrap}.actions form{margin:0}.advanced{margin-top:24px;color:#5f6b7a}.advanced summary{cursor:pointer;font-weight:700}.simple-steps{font-size:1.1rem;line-height:1.65}.coverage-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px 20px;padding:20px 0;border-top:1px solid #e5eaf2}.coverage-row:first-child{border-top:0}.coverage-main{min-width:0}.coverage-update{grid-column:1/-1;display:grid;grid-template-columns:180px minmax(220px,1fr) auto;gap:10px}.next-action{color:#7a4d00}.coverage-actions form{margin:0}@media(max-width:720px){:root{font-size:19px}.parent-counts{grid-template-columns:1fr 1fr}.task-row,.coverage-row{display:block}.task-row .button,.coverage-actions .button,.coverage-actions button{margin-top:12px;width:100%;text-align:center}.coverage-update{display:grid;grid-template-columns:1fr;margin-top:12px}}
  </style>
  <style>
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
    .filter-button.active{background:#14213d;color:white}
    .bulk-bar{position:sticky;bottom:12px;background:#f3f7fd;border:1px solid #ced7e5;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;z-index:2}
    .bulk-bar select{width:auto;min-width:220px}.item-check{width:22px;height:22px;margin:0 10px 0 0;vertical-align:middle}
    .bot-status{display:inline-flex;align-items:center;gap:8px;color:white;padding:8px 11px;border-radius:999px;background:#33425f;font-size:.85rem;font-weight:750}
    .bot-status-dot{width:12px;height:12px;border-radius:50%;background:#aeb8c8;box-shadow:0 0 0 3px rgba(255,255,255,.14)}
    .bot-status.working .bot-status-dot{background:#61d394}.bot-status.help_needed .bot-status-dot{background:#ffc857}.bot-status.repair .bot-status-dot{background:#ff6b6b}.bot-status.caught_up .bot-status-dot{background:#78a9ff}
    .bot-status[data-count]:after{content:attr(data-count);display:none;min-width:22px;height:22px;padding:2px 6px;border-radius:12px;background:#d98200;color:white;text-align:center}.bot-status.has-alerts:after{display:inline-block}
  </style>
</head>
<body>
<header>
  <a href="/">DataSniper Privacy Agent</a>
  <nav><a href="/">Home</a> · <a href="/help-needed">Help Needed</a> · <a href="/history">History</a> · <a href="/settings">Settings</a></nav>
  <a id="bot-status" class="bot-status" href="/automation" title="Checking the privacy bot" aria-live="polite">
    <span class="bot-status-dot" aria-hidden="true"></span><span id="bot-status-text">Checking bot…</span>
  </a>
</header>
<main>{% block content %}{% endblock %}</main>
<script>
(() => {
  const badge = document.getElementById("bot-status");
  const label = document.getElementById("bot-status-text");
  let lastNotice = Number(localStorage.getItem("datasniper-last-notice") || 0);
  const labels = {working:"Bot is working",help_needed:"Your help is needed",repair:"Bot needs attention",caught_up:"Bot is ready"};
  async function updateBotStatus() {
    try {
      const response = await fetch("/automation/status", {cache:"no-store"});
      if (!response.ok) throw new Error("status unavailable");
      const data = await response.json();
      const state = data.parent?.state || (data.worker?.online ? "working" : "repair");
      badge.className = "bot-status " + state + (data.unread_notifications ? " has-alerts" : "");
      badge.dataset.count = data.unread_notifications || "";
      label.textContent = labels[state] || "Bot status";
      badge.title = data.parent?.message || data.worker?.detail || "Open bot details";
      const notice = data.latest_notification;
      if (notice && Number(notice.id) > lastNotice) {
        lastNotice = Number(notice.id);
        localStorage.setItem("datasniper-last-notice", String(lastNotice));
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification(notice.title, {body:notice.detail, tag:"datasniper-" + notice.kind});
        }
      }
    } catch (_) {
      badge.className = "bot-status repair";
      label.textContent = "Bot status unavailable";
      badge.title = "DataSniper could not read the background bot status.";
    }
  }
  badge.addEventListener("click", () => {
    if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
  });
  updateBotStatus();
  setInterval(updateBotStatus, 15000);
})();
</script>
</body>
</html>
